services:
  db-ods-tenant1:
    build:
      context: ../../../../Settings/shared/DB-Ods/pgsql/
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      TPDM_ENABLED: "${TPDM_ENABLED:-true}"
      SQL_BACKUPS_FOLDER: "${SQL_BACKUPS_FOLDER}"
      MINIMAL_SQL_PATH: "${MINIMAL_SQL_PATH:-/var/opt/pgsql/data/sql-backups/EdFi.Ods.Minimal.Template.sql}"
      POPULATED_SQL_PATH: "${POPULATED_SQL_PATH:-/var/opt/pgsql/data/sql-backups/EdFi.Ods.Populated.Template.sql}"
    volumes:
      - vol-db-ods-tenant1:/var/lib/postgresql/data
      - ${SQL_BACKUPS_FOLDER}:/var/opt/pgsql/data/sql-backups/:ro
    restart: always
    container_name: ed-fi-db-ods-tenant1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready  -U ${POSTGRES_USER}"]
      start_period: "60s"
      retries: 3

  db-ods-tenant2:
    build:
      context: ../../../../Settings/shared/DB-Ods/pgsql/
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      TPDM_ENABLED: "${TPDM_ENABLED:-true}"
      SQL_BACKUPS_FOLDER: "${SQL_BACKUPS_FOLDER}"
      MINIMAL_SQL_PATH: "${MINIMAL_SQL_PATH:-/var/opt/pgsql/data/sql-backups/EdFi.Ods.Minimal.Template.sql}"
      POPULATED_SQL_PATH: "${POPULATED_SQL_PATH:-/var/opt/pgsql/data/sql-backups/EdFi.Ods.Populated.Template.sql}"
    volumes:
      - vol-db-ods-tenant2:/var/lib/postgresql/data
      - ${SQL_BACKUPS_FOLDER}:/var/opt/pgsql/data/sql-backups/:ro
    restart: always
    container_name: ed-fi-db-ods-tenant2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready  -U ${POSTGRES_USER}"]
      start_period: "60s"
      retries: 3

  api:
    image: edfialliance/ods-api-web-api:${TAG}
    environment:
      ADMIN_POSTGRES_HOST: db-admin-tenant1
      API_HEALTHCHECK_TEST: ${API_HEALTHCHECK_TEST?Please consult env.example to set the API healthcheck test}
      ApiSettings__Features:11:IsEnabled: true
      ASPNETCORE_ENVIRONMENT: "docker"
      ENCRYPT_CONNECTION: "${ENCRYPT_CONNECTION:-false}"
      NPG_API_MAX_POOL_SIZE_ADMIN: "${NPG_API_MAX_POOL_SIZE_ADMIN}"
      NPG_API_MAX_POOL_SIZE_MASTER: "${NPG_API_MAX_POOL_SIZE_MASTER}"
      NPG_API_MAX_POOL_SIZE_ODS: "${NPG_API_MAX_POOL_SIZE_ODS}"
      NPG_API_MAX_POOL_SIZE_SECURITY: "${NPG_API_MAX_POOL_SIZE_SECURITY}"
      NPG_POOLING_ENABLED: "${NPG_POOLING_ENABLED:-false}"
      ODS_CONNECTION_STRING_ENCRYPTION_KEY: "${ODS_CONNECTION_STRING_ENCRYPTION_KEY}"
      ODS_WAIT_POSTGRES_HOSTS: "db-ods-tenant1 db-ods-tenant2 "
      PATH_BASE: "${ODS_VIRTUAL_NAME:-api}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_USER: "${POSTGRES_USER}"
      TPDM_ENABLED: "${TPDM_ENABLED:-true}"
      Tenants__tenant1__ConnectionStrings__EdFi_Admin: "host=db-admin-tenant1;port=${POSTGRES_PORT};username=${POSTGRES_USER};password=${POSTGRES_PASSWORD};database=EdFi_Admin;pooling=true"
      Tenants__tenant1__ConnectionStrings__EdFi_Security: "host=db-admin-tenant1;port=${POSTGRES_PORT};username=${POSTGRES_USER};password=${POSTGRES_PASSWORD};database=EdFi_Security;pooling=true"
      Tenants__tenant2__ConnectionStrings__EdFi_Admin: "host=db-admin-tenant2;port=${POSTGRES_PORT};username=${POSTGRES_USER};password=${POSTGRES_PASSWORD};database=EdFi_Admin;pooling=true"
      Tenants__tenant2__ConnectionStrings__EdFi_Security: "host=db-admin-tenant2;port=${POSTGRES_PORT};username=${POSTGRES_USER};password=${POSTGRES_PASSWORD};database=EdFi_Security;pooling=true"
    volumes:
      - ${LOGS_FOLDER}:/app/logs
    depends_on:
      - db-ods-tenant1
      - db-ods-tenant2
      - db-admin-tenant1
      - db-admin-tenant2
    restart: always
    hostname: api
    container_name: ed-fi-ods-api
    healthcheck:
      test: $$API_HEALTHCHECK_TEST
      start_period: "60s"
      retries: 3

volumes:
  vol-db-ods-tenant1:
    driver: local
    name: vol-db-ods-tenant1
  vol-db-ods-tenant2:
    driver: local
    name: vol-db-ods-tenant2
